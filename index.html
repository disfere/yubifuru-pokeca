<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ゆびをふるポケカ - Web版土台</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-soft: #334155;
      --accent: #38bdf8;
      --text: #e5eefc;
      --muted: #94a3b8;
      --overlay: rgba(0, 0, 0, 0.5);
      --card-ratio: 63 / 88;
      --gap: 12px;
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
      color: var(--text);
      overflow: hidden;
    }

    button {
      font: inherit;
      border: none;
      border-radius: 14px;
      padding: 0;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease, background-color 0.12s ease;
    }

    button:active {
      transform: scale(0.98);
    }

    .app {
      display: grid;
      grid-template-columns: minmax(180px, 34vw) 1fr;
      gap: var(--gap);
      width: 100%;
      height: 100%;
      padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
    }

    .panel {
      background: rgba(30, 41, 59, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px;
      min-width: 0;
    }

    .controls h1 {
      margin: 0 0 4px;
      font-size: 1rem;
      text-align: center;
    }

    .controls h2 {
      margin: 6px 2px 0;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .row {
      display: grid;
      gap: 8px;
    }

    .row.row-3 {
      grid-template-columns: repeat(3, 1fr);
    }

    .row.row-2 {
      grid-template-columns: repeat(2, 1fr);
    }

    .action-btn {
      min-height: 52px;
      background: var(--panel-soft);
      color: var(--text);
      font-weight: 700;
    }

    .action-btn:hover {
      background: #475569;
    }

    .right-column {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--gap);
      min-width: 0;
    }

    .slot {
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 10px;
      min-height: 0;
    }

    .slot-title {
      margin: 0;
      font-size: 0.9rem;
      text-align: center;
      color: var(--muted);
    }

    .slot-card {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      background: #0b1220;
      border: 1px solid rgba(148, 163, 184, 0.14);
      overflow: hidden;
      position: relative;
      padding: 8px;
    }

    .card-image,
    .overlay-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 12px;
      background: #111827;
    }

    .placeholder-card {
      width: min(100%, calc(100vh * 0.35 * 0.72));
      aspect-ratio: var(--card-ratio);
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 12px;
      font-weight: 800;
      line-height: 1.3;
      color: #fff;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      box-shadow: 0 10px 20px rgba(0,0,0,0.25);
      white-space: pre-line;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: var(--overlay);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 100;
    }

    .overlay.is-open {
      display: flex;
    }

    .overlay-content {
      width: min(96vw, 720px);
      max-width: 100%;
      max-height: 96vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .overlay-card-wrap {
      width: 100%;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 0;
    }

    .overlay-card {
      width: min(88vw, 520px);
      max-width: 100%;
      max-height: 78vh;
      aspect-ratio: var(--card-ratio);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      text-align: center;
      color: white;
      background: #111827;
      border: 3px solid rgba(255,255,255,0.15);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      position: relative;
    }

    .overlay-loading {
      font-weight: 800;
      font-size: 1.1rem;
      color: white;
      white-space: pre-line;
    }

    .overlay-meta {
      font-size: 0.9rem;
      color: #dbeafe;
      text-align: center;
      min-height: 1.4em;
      margin-top: -4px;
    }

    .ok-btn {
      min-width: 140px;
      min-height: 50px;
      padding: 0 20px;
      background: #f8fafc;
      color: #0f172a;
      font-weight: 800;
    }

    .ok-btn:disabled,
    .action-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .status-badge {
      position: fixed;
      top: 10px;
      right: 12px;
      z-index: 20;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    @media (max-width: 760px) {
      .overlay-card {
        max-height: 76vh;
      }

      .action-btn {
        min-height: 48px;
        font-size: 0.9rem;
      }

      .overlay-card {
        width: min(76vw, 320px);
      }
    }
  </style>
</head>
<body>
  <div class="status-badge">state: <span id="statusText">idle</span></div>

  <main class="app">
    <section class="panel controls">
      <h1>ゆびをふるポケカ</h1>

      <h2>ワザ</h2>
      <div class="row row-3">
        <button class="action-btn" data-action="waza1">1</button>
        <button class="action-btn" data-action="waza2">2</button>
        <button class="action-btn" data-action="waza3">3</button>
      </div>
      <div class="row row-2">
        <button class="action-btn" data-action="waza4">4</button>
        <button class="action-btn" data-action="waza5">5</button>
      </div>

      <h2>その他</h2>
      <button class="action-btn" data-action="goods">グッズ</button>
      <button class="action-btn" data-action="support">サポート</button>
      <button class="action-btn" data-action="tool">どうぐ</button>
      <button class="action-btn" data-action="stadium">スタジアム</button>
    </section>

    <section class="right-column">
      <article class="panel slot">
        <h2 class="slot-title">どうぐ</h2>
        <div class="slot-card" id="toolSlot"></div>
      </article>

      <article class="panel slot">
        <h2 class="slot-title">スタジアム</h2>
        <div class="slot-card" id="stadiumSlot"></div>
      </article>
    </section>
  </main>

  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="overlay-content">
      <div class="overlay-card-wrap">
        <div class="overlay-card" id="overlayCard">ここに結果が表示されます</div>
      </div>
      <div class="overlay-meta" id="overlayMeta"></div>
      <button class="ok-btn" id="okButton" disabled>OK</button>
    </div>
  </div>

  <script>
    const decisionSound = new Audio('./sounds/decision.mp3');

    const State = {
      IDLE: 'idle',
      ROLLING: 'rolling',
      RESULT: 'result',
      LOADING: 'loading',
    };

    const appState = {
      status: State.LOADING,
      currentAction: null,
      currentResult: null,
      pendingTarget: null,
      imagePool: {},
    };

    const CATEGORY_META = {
      waza1: { label: 'ワザ1', type: 'overlayOnly' },
      waza2: { label: 'ワザ2', type: 'overlayOnly' },
      waza3: { label: 'ワザ3', type: 'overlayOnly' },
      waza4: { label: 'ワザ4', type: 'overlayOnly' },
      waza5: { label: 'ワザ5', type: 'overlayOnly' },
      goods: { label: 'グッズ', type: 'overlayOnly' },
      support: { label: 'サポート', type: 'overlayOnly' },
      tool: { label: 'どうぐ', type: 'toolSlot' },
      stadium: { label: 'スタジアム', type: 'stadiumSlot' },
    };

    const els = {
      overlay: document.getElementById('overlay'),
      overlayCard: document.getElementById('overlayCard'),
      overlayMeta: document.getElementById('overlayMeta'),
      okButton: document.getElementById('okButton'),
      statusText: document.getElementById('statusText'),
      toolSlot: document.getElementById('toolSlot'),
      stadiumSlot: document.getElementById('stadiumSlot'),
      actionButtons: [...document.querySelectorAll('.action-btn')],
    };

    function setStatus(next) {
      appState.status = next;
      els.statusText.textContent = next;

      const disabled = next !== State.IDLE;
      els.actionButtons.forEach(btn => {
        btn.disabled = disabled;
      });

      els.okButton.disabled = next !== State.RESULT;
    }

    async function loadManifest() {
      const response = await fetch('./data/manifest.json', { cache: 'no-store' });
      if (!response.ok) {
        throw new Error('manifest.json の読み込みに失敗しました');
      }

      const manifest = await response.json();
      appState.imagePool = manifest;
    }

    function pickRandomImage(category) {
      const images = appState.imagePool[category] || [];
      if (images.length === 0) {
        return null;
      }

      const index = Math.floor(Math.random() * images.length);
      return images[index];
    }

    function renderPlaceholder(element, label) {
      element.innerHTML = '';
      const card = document.createElement('div');
      card.className = 'placeholder-card';
      card.textContent = label;
      element.appendChild(card);
    }

    function renderImageCard(element, imagePath, altText) {
      element.innerHTML = '';
      const img = document.createElement('img');
      img.src = imagePath;
      img.alt = altText;
      img.className = 'card-image';
      element.appendChild(img);
    }

    function renderOverlayImage(imagePath, altText) {
      els.overlayCard.innerHTML = '';
      const img = document.createElement('img');
      img.src = imagePath;
      img.alt = altText;
      img.className = 'overlay-image';
      els.overlayCard.appendChild(img);
    }

    function renderOverlayLoading(text) {
      els.overlayCard.innerHTML = '';
      const loading = document.createElement('div');
      loading.className = 'overlay-loading';
      loading.textContent = text;
      els.overlayCard.appendChild(loading);
    }

    function openOverlay(actionKey) {
      const config = CATEGORY_META[actionKey];
      if (!config || appState.status !== State.IDLE) return;

      const images = appState.imagePool[actionKey] || [];
      if (images.length === 0) {
        window.alert(`${config.label} の画像がありません。manifest.json を確認してください。`);
        return;
      }

      appState.currentAction = actionKey;
      appState.pendingTarget = config.type;
      appState.currentResult = null;

      els.overlay.classList.add('is-open');
      els.overlay.setAttribute('aria-hidden', 'false');
      renderOverlayLoading('抽選中...');
      els.overlayMeta.textContent = `${config.label} を表示しています`;

      setStatus(State.ROLLING);
      startRoulette(actionKey, config, images);
    }

    function applyResult() {
      const actionKey = appState.currentAction;
      const config = CATEGORY_META[actionKey];
      const result = appState.currentResult;
      if (!config || !result || appState.status !== State.RESULT) return;

      if (config.type === 'toolSlot') {
        renderImageCard(els.toolSlot, result, config.label);
      } else if (config.type === 'stadiumSlot') {
        renderImageCard(els.stadiumSlot, result, config.label);
      }

      closeOverlay();
    }

    function startRoulette(actionKey, config, images) {
      const sequence = [
        60, 60, 70, 70,
        80, 90, 100, 120,
        150, 180, 220, 260, 320, 700, 320
      ];

      let stepIndex = 0;
      let previewImage = null;
      let lastPreviewImage = null;

      const pickPreviewImage = () => {
        if (images.length === 1) return images[0];

        let nextImage = images[Math.floor(Math.random() * images.length)];
        while (nextImage === lastPreviewImage) {
          nextImage = images[Math.floor(Math.random() * images.length)];
        }
        lastPreviewImage = nextImage;
        return nextImage;
      };

      const showNext = () => {
        previewImage = pickPreviewImage();
        renderOverlayImage(previewImage, config.label);
        els.overlayMeta.textContent = `${config.label} を表示しています...`;

        if (stepIndex < sequence.length - 1) {
          const delay = sequence[stepIndex];
          stepIndex += 1;
          window.setTimeout(showNext, delay);
          return;
        }

        // 停止前の“間”
        els.overlayMeta.textContent = `${config.label} が止まります...`;

        window.setTimeout(() => {
          appState.currentResult = previewImage;
          decisionSound.currentTime = 0;
          decisionSound.play();
          els.overlayMeta.textContent = `${config.label} の結果`;

          const img = els.overlayCard.querySelector('.overlay-image');
          if (img) {
            img.animate(
              [
                { transform: 'scale(1)' },
                { transform: 'scale(1.08)' },
                { transform: 'scale(1)' }
              ],
              {
                duration: 280,
                easing: 'ease-out'
              }
            );
          }

          setStatus(State.RESULT);
        }, 500);
      };

      window.setTimeout(showNext, 120);
    }

    function closeOverlay() {
      els.overlay.classList.remove('is-open');
      els.overlay.setAttribute('aria-hidden', 'true');
      appState.currentAction = null;
      appState.currentResult = null;
      appState.pendingTarget = null;
      els.overlayMeta.textContent = '';
      setStatus(State.IDLE);
    }

    function initDefaultSlots() {
      const defaultTool = pickRandomImage('tool');
      const defaultStadium = pickRandomImage('stadium');

      if (defaultTool) {
        renderImageCard(els.toolSlot, defaultTool, 'どうぐ');
      } else {
        renderPlaceholder(els.toolSlot, '未設定 どうぐ');
      }

      if (defaultStadium) {
        renderImageCard(els.stadiumSlot, defaultStadium, 'スタジアム');
      } else {
        renderPlaceholder(els.stadiumSlot, '未設定 スタジアム');
      }
    }

    async function initializeApp() {
      try {
        await loadManifest();
        initDefaultSlots();
        setStatus(State.IDLE);
      } catch (error) {
        console.error(error);
        renderPlaceholder(els.toolSlot, 'manifest読込エラー');
        renderPlaceholder(els.stadiumSlot, 'manifest読込エラー');
        els.overlayMeta.textContent = 'manifest.json を確認してください';
        els.statusText.textContent = 'error';
        els.actionButtons.forEach(btn => {
          btn.disabled = true;
        });
      }
    }

    els.actionButtons.forEach(button => {
      button.addEventListener('click', () => {
        openOverlay(button.dataset.action);
      });
    });

    els.okButton.addEventListener('click', applyResult);

    initializeApp();
  </script>
</body>
</html>
