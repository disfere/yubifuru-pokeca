<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ゆびをふるポケカ - Web版土台</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-soft: #334155;
      --accent: #38bdf8;
      --text: #e5eefc;
      --muted: #94a3b8;
      --overlay: rgba(0, 0, 0, 0.5);
      --card-ratio: 63 / 88;
      --gap: 12px;
      --radius: 16px;
      --rare-gold: #facc15;
      --rare-orange: #fb923c;
      --rare-purple: #a855f7;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
      color: var(--text);
      overflow-x: hidden;
      overflow-y: auto;
    }

    button {
      font: inherit;
      border: none;
      border-radius: 14px;
      padding: 0;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease, background-color 0.12s ease;
    }

    button:active {
      transform: scale(0.98);
    }

    .app {
      display: grid;
      grid-template-columns: minmax(180px, 34vw) 1fr;
      gap: var(--gap);
      width: 100%;
      min-height: 100svh;
      padding:
        max(12px, env(safe-area-inset-top))
        max(12px, env(safe-area-inset-right))
        max(12px, env(safe-area-inset-bottom))
        max(12px, env(safe-area-inset-left));
    }

    .panel {
      background: rgba(30, 41, 59, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px;
      min-width: 0;
    }

    .controls h1 {
      margin: 0 0 4px;
      font-size: 1rem;
      text-align: center;
    }

    .controls h2 {
      margin: 6px 2px 0;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .row {
      display: grid;
      gap: 8px;
    }

    .row.row-3 {
      grid-template-columns: repeat(3, 1fr);
    }

    .row.row-2 {
      grid-template-columns: repeat(2, 1fr);
    }

    .action-btn {
      min-height: 52px;
      background: var(--panel-soft);
      color: var(--text);
      font-weight: 700;
    }

    .action-btn:hover {
      background: #475569;
    }

    .right-column {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--gap);
      min-width: 0;
    }

    .slot {
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 10px;
      min-height: 0;
    }

    .slot-title {
      margin: 0;
      font-size: 0.9rem;
      text-align: center;
      color: var(--muted);
    }

    .slot-card {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      background: #0b1220;
      border: 1px solid rgba(148, 163, 184, 0.14);
      overflow: hidden;
      position: relative;
      padding: 8px;
    }

    .card-image,
    .overlay-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 12px;
      background: #111827;
    }

    .placeholder-card {
      width: min(100%, calc(100vh * 0.35 * 0.72));
      aspect-ratio: var(--card-ratio);
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 12px;
      font-weight: 800;
      line-height: 1.3;
      color: #fff;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      box-shadow: 0 10px 20px rgba(0,0,0,0.25);
      white-space: pre-line;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: var(--overlay);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 100;
    }

    .overlay.is-open {
      display: flex;
    }

    .overlay-content {
      width: min(96vw, 720px);
      max-width: 100%;
      max-height: 96vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .overlay-card-wrap {
      width: 100%;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 0;
    }

    .overlay-card {
      width: min(88vw, 520px);
      max-width: 100%;
      max-height: 78vh;
      aspect-ratio: var(--card-ratio);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      text-align: center;
      color: white;
      background: #111827;
      border: 3px solid rgba(255,255,255,0.15);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      position: relative;
    }

    .overlay-card.is-rare {
      border-color: rgba(250, 204, 21, 0.95);
      box-shadow:
        0 0 0 2px rgba(255, 255, 255, 0.12),
        0 0 18px rgba(250, 204, 21, 0.45),
        0 0 36px rgba(168, 85, 247, 0.28),
        0 18px 36px rgba(0, 0, 0, 0.4);
      background:
        radial-gradient(circle at top, rgba(250, 204, 21, 0.18), transparent 42%),
        linear-gradient(180deg, #111827 0%, #1f2937 100%);
    }

    .overlay-card.is-rare::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          120deg,
          transparent 0%,
          rgba(255, 255, 255, 0.00) 35%,
          rgba(255, 255, 255, 0.35) 50%,
          rgba(255, 255, 255, 0.00) 65%,
          transparent 100%
        );
      transform: translateX(-140%);
      animation: rareShine 1.2s ease-out infinite;
      pointer-events: none;
      z-index: 1;
    }

    .overlay-image,
    .rare-flash-wrap,
    .overlay-loading {
      position: relative;
      z-index: 2;
    }

    .overlay-loading {
      font-weight: 800;
      font-size: 1.1rem;
      color: white;
      white-space: pre-line;
    }

    .overlay-meta {
      font-size: 0.9rem;
      color: #dbeafe;
      text-align: center;
      min-height: 1.4em;
      margin-top: -4px;
    }

    .ok-btn {
      min-width: 140px;
      min-height: 50px;
      padding: 0 20px;
      background: #f8fafc;
      color: #0f172a;
      font-weight: 800;
    }

    .ok-btn:disabled,
    .action-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .status-badge {
      position: fixed;
      top: 10px;
      right: 12px;
      z-index: 20;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .rare-flash-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .rare-flash-badge {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      color: #1f2937;
      background: linear-gradient(135deg, #fde68a, #facc15);
      box-shadow: 0 0 12px rgba(250, 204, 21, 0.45);
    }

    .rare-flash-text {
      font-size: clamp(1.7rem, 6vw, 3.2rem);
      font-weight: 900;
      color: #fff;
      text-align: center;
      letter-spacing: 0.08em;
      text-shadow:
        0 0 8px rgba(255,255,255,0.9),
        0 0 18px rgba(250,204,21,0.95),
        0 0 34px rgba(251,146,60,0.75),
        0 0 48px rgba(168,85,247,0.7);
    }

    .rare-flash-sub {
      font-size: 0.9rem;
      font-weight: 700;
      color: #fef3c7;
      text-align: center;
      letter-spacing: 0.06em;
    }

    @keyframes rareShine {
      0% {
        transform: translateX(-140%);
      }
      100% {
        transform: translateX(140%);
      }
    }

    @media (max-width: 760px) {
      .app {
        grid-template-columns: minmax(150px, 38vw) 1fr;
        gap: 8px;
        padding: 8px;
      }

      .controls {
        gap: 8px;
        padding: 10px;
      }

      .controls h1 {
        font-size: 0.95rem;
      }

      .controls h2,
      .slot-title {
        font-size: 0.78rem;
      }

      .slot {
        padding: 8px;
        gap: 8px;
      }

      .action-btn {
        min-height: 44px;
        font-size: 0.88rem;
      }

      .status-badge {
        top: 6px;
        right: 6px;
        padding: 4px 10px;
        font-size: 0.72rem;
      }

      .overlay-card {
        max-height: 76vh;
        width: min(76vw, 320px);
      }
    }

    @media (orientation: landscape) and (max-height: 500px) {
      .app {
        grid-template-columns: minmax(130px, 30vw) 1fr;
        gap: 6px;
        padding: 6px;
        min-height: 100svh;
      }

      .controls {
        gap: 6px;
        padding: 8px;
      }

      .controls h1 {
        margin: 0;
        font-size: 0.82rem;
      }

      .controls h2,
      .slot-title {
        margin: 2px 0 0;
        font-size: 0.7rem;
      }

      .row {
        gap: 6px;
      }

      .action-btn {
        min-height: 34px;
        font-size: 0.8rem;
      }

      .slot {
        padding: 6px;
        gap: 6px;
      }

      .slot-card {
        padding: 6px;
      }

      .status-badge {
        top: 4px;
        right: 4px;
        padding: 3px 8px;
        font-size: 0.66rem;
      }
    }
  </style>
</head>
<body>
  <div class="status-badge">state: <span id="statusText">idle</span></div>

  <main class="app">
    <section class="panel controls">
      <h1>ゆびをふるポケカ</h1>

      <h2>ワザ</h2>
      <div class="row row-3">
        <button class="action-btn" data-action="waza1">1</button>
        <button class="action-btn" data-action="waza2">2</button>
        <button class="action-btn" data-action="waza3">3</button>
      </div>
      <div class="row row-3">
        <button class="action-btn" data-action="waza4">4</button>
        <button class="action-btn" data-action="waza5">5</button>
        <button class="action-btn" data-action="waza_sp">SP</button>
      </div>

      <h2>その他</h2>
      <button class="action-btn" data-action="goods">グッズ</button>
      <button class="action-btn" data-action="support">サポート</button>
      <button class="action-btn" data-action="tool">どうぐ</button>
      <button class="action-btn" data-action="stadium">スタジアム</button>
    </section>

    <section class="right-column">
      <article class="panel slot">
        <h2 class="slot-title">どうぐ</h2>
        <div class="slot-card" id="toolSlot"></div>
      </article>

      <article class="panel slot">
        <h2 class="slot-title">スタジアム</h2>
        <div class="slot-card" id="stadiumSlot"></div>
      </article>
    </section>
  </main>

  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="overlay-content">
      <div class="overlay-card-wrap">
        <div class="overlay-card" id="overlayCard">ここに結果が表示されます</div>
      </div>
      <div class="overlay-meta" id="overlayMeta"></div>
      <button class="ok-btn" id="okButton" disabled>OK</button>
    </div>
  </div>

  <script>
    const decisionSound = new Audio('./sounds/decision.mp3');
    const RARE_RATE = 0.10;

    const State = {
      IDLE: 'idle',
      ROLLING: 'rolling',
      RESULT: 'result',
      LOADING: 'loading',
    };

    const appState = {
      status: State.LOADING,
      currentAction: null,
      currentResult: null,
      pendingTarget: null,
      imagePool: {},
      isRareHit: false,
    };

    const CATEGORY_META = {
      waza1: { label: 'ワザ1', type: 'overlayOnly' },
      waza2: { label: 'ワザ2', type: 'overlayOnly' },
      waza3: { label: 'ワザ3', type: 'overlayOnly' },
      waza4: { label: 'ワザ4', type: 'overlayOnly' },
      waza5: { label: 'ワザ5', type: 'overlayOnly' },
      waza_sp: {
        label: 'Vstarパワー',
        type: 'overlayOnly',
        forceRare: true
      },

      goods: {
        label: 'グッズ',
        type: 'overlayOnly',
        rareEnabled: true,
        rareCategory: 'goods_ace',
      },

      support: { label: 'サポート', type: 'overlayOnly' },

      tool: {
        label: 'どうぐ',
        type: 'toolSlot',
        rareEnabled: true,
        rareCategory: 'tool_ace',
      },

      stadium: {
        label: 'スタジアム',
        type: 'stadiumSlot',
        rareEnabled: true,
        rareCategory: 'stadium_ace',
      },
    };

    const els = {
      overlay: document.getElementById('overlay'),
      overlayCard: document.getElementById('overlayCard'),
      overlayMeta: document.getElementById('overlayMeta'),
      okButton: document.getElementById('okButton'),
      statusText: document.getElementById('statusText'),
      toolSlot: document.getElementById('toolSlot'),
      stadiumSlot: document.getElementById('stadiumSlot'),
      actionButtons: [...document.querySelectorAll('.action-btn')],
    };

    function setStatus(next) {
      appState.status = next;
      els.statusText.textContent = next;

      const disabled = next !== State.IDLE;
      els.actionButtons.forEach(btn => {
        btn.disabled = disabled;
      });

      els.okButton.disabled = next !== State.RESULT;
    }

    async function loadManifest() {
      const response = await fetch('./data/manifest.json', { cache: 'no-store' });
      if (!response.ok) {
        throw new Error('manifest.json の読み込みに失敗しました');
      }

      const manifest = await response.json();
      appState.imagePool = manifest;
    }

    function pickRandomImage(category) {
      const images = appState.imagePool[category] || [];
      if (images.length === 0) {
        return null;
      }

      const index = Math.floor(Math.random() * images.length);
      return images[index];
    }

    function rollRare(config) {

      if (config?.forceRare) return true;

      if (!config?.rareEnabled) return false;

      const rareImages = appState.imagePool[config.rareCategory] || [];
      if (rareImages.length === 0) {
        return false;
      }

      return Math.random() < RARE_RATE;
    }

    function renderPlaceholder(element, label) {
      element.innerHTML = '';
      const card = document.createElement('div');
      card.className = 'placeholder-card';
      card.textContent = label;
      element.appendChild(card);
    }

    function renderImageCard(element, imagePath, altText) {
      element.innerHTML = '';
      const img = document.createElement('img');
      img.src = imagePath;
      img.alt = altText;
      img.className = 'card-image';
      element.appendChild(img);
    }

    function setOverlayRareMode(isRare) {
      els.overlayCard.classList.toggle('is-rare', isRare);
    }

    function renderOverlayImage(imagePath, altText) {
      els.overlayCard.innerHTML = '';
      const img = document.createElement('img');
      img.src = imagePath;
      img.alt = altText;
      img.className = 'overlay-image';
      els.overlayCard.appendChild(img);
    }

    function renderOverlayLoading(text) {
      els.overlayCard.innerHTML = '';
      const loading = document.createElement('div');
      loading.className = 'overlay-loading';
      loading.textContent = text;
      els.overlayCard.appendChild(loading);
    }

    function renderRareIntro(text = 'ACE CHANCE!') {
      els.overlayCard.innerHTML = '';

      const wrap = document.createElement('div');
      wrap.className = 'rare-flash-wrap';

      const badge = document.createElement('div');
      badge.className = 'rare-flash-badge';
      badge.textContent = 'RARE HIT';

      const title = document.createElement('div');
      title.className = 'rare-flash-text';
      title.textContent = text;

      const sub = document.createElement('div');
      sub.className = 'rare-flash-sub';
      sub.textContent = '特別効果発動！';

      wrap.appendChild(badge);
      wrap.appendChild(title);
      wrap.appendChild(sub);
      els.overlayCard.appendChild(wrap);
    }

    function startRareIntro(onComplete, text) {
      setOverlayRareMode(true);
      renderRareIntro(text);
      els.overlayMeta.textContent = '特別演出！';

      els.overlayCard.animate(
        [
          { transform: 'scale(0.90)', opacity: 0.35 },
          { transform: 'scale(1.08)', opacity: 1 },
          { transform: 'scale(1.00)', opacity: 1 }
        ],
        {
          duration: 1200,
          easing: 'ease-out'
        }
      );

      window.setTimeout(() => {
        onComplete();
      }, 1600);
    }

    function openOverlay(actionKey) {
      const config = CATEGORY_META[actionKey];
      if (!config || appState.status !== State.IDLE) return;

      const normalImages = appState.imagePool[actionKey] || [];
      
      const rareText = config.forceRare ? 'Vstarパワー' : 'ACE CHANCE!';

      const rareImages = config.forceRare
        ? (appState.imagePool[actionKey] || [])
        : config.rareCategory
          ? (appState.imagePool[config.rareCategory] || [])
          : [];

      if (normalImages.length === 0 && rareImages.length === 0) {
        window.alert(`${config.label} の画像がありません。manifest.json を確認してください。`);
        return;
      }

      appState.currentAction = actionKey;
      appState.pendingTarget = config.type;
      appState.currentResult = null;
      appState.isRareHit = false;

      els.overlay.classList.add('is-open');
      els.overlay.setAttribute('aria-hidden', 'false');

      const rareHit = rollRare(config);
      appState.isRareHit = rareHit;
      setOverlayRareMode(rareHit);

      if (rareHit) {
        setStatus(State.ROLLING);
        renderOverlayLoading('レア演出発生...');
        els.overlayMeta.textContent = `${config.label} のレア抽選中...`;

        startRareIntro(() => {
          startRoulette(actionKey, config, rareImages, true);
        }, rareText);
        return;
      }

      if (normalImages.length === 0) {
        window.alert(`${config.label} の通常画像がありません。`);
        closeOverlay();
        return;
      }

      renderOverlayLoading('抽選中...');
      els.overlayMeta.textContent = `${config.label} を表示しています`;
      setStatus(State.ROLLING);
      startRoulette(actionKey, config, normalImages, false);
    }

    function applyResult() {
      const actionKey = appState.currentAction;
      const config = CATEGORY_META[actionKey];
      const result = appState.currentResult;
      if (!config || !result || appState.status !== State.RESULT) return;

      if (config.type === 'toolSlot') {
        renderImageCard(els.toolSlot, result, appState.isRareHit ? `${config.label} ACE` : config.label);
      } else if (config.type === 'stadiumSlot') {
        renderImageCard(els.stadiumSlot, result, appState.isRareHit ? `${config.label} ACE` : config.label);
      }

      closeOverlay();
    }

    function startRoulette(actionKey, config, images, isRare = false) {
      const sequence = isRare
        ? [
            60, 60, 70, 70, 80, 90, 100, 120, 150,
            180, 220, 260, 320, 400, 500, 700, 900, 1200
          ]
        : [
            60, 60, 70, 70,
            80, 90, 100, 120,
            150, 180, 220, 260, 320, 700, 320
          ];

      let stepIndex = 0;
      let previewImage = null;
      let lastPreviewImage = null;

      const pickPreviewImage = () => {
        if (images.length === 1) return images[0];

        let nextImage = images[Math.floor(Math.random() * images.length)];
        while (nextImage === lastPreviewImage) {
          nextImage = images[Math.floor(Math.random() * images.length)];
        }
        lastPreviewImage = nextImage;
        return nextImage;
      };

      const showNext = () => {
        previewImage = pickPreviewImage();
        renderOverlayImage(previewImage, isRare ? `${config.label} ACE` : config.label);
        setOverlayRareMode(isRare);

        els.overlayMeta.textContent = isRare
          ? `${config.label} のACE抽選中...`
          : `${config.label} を表示しています...`;

        if (stepIndex < sequence.length - 1) {
          const delay = sequence[stepIndex];
          stepIndex += 1;
          window.setTimeout(showNext, delay);
          return;
        }

        els.overlayMeta.textContent = isRare
          ? `${config.label} ACE が止まります...`
          : `${config.label} が止まります...`;

        window.setTimeout(() => {
          appState.currentResult = previewImage;
          decisionSound.currentTime = 0;
          decisionSound.play().catch(() => {});

          els.overlayMeta.textContent = isRare
            ? `${config.label} ACE の結果`
            : `${config.label} の結果`;

          const img = els.overlayCard.querySelector('.overlay-image');
          if (img) {
            img.animate(
              isRare
                ? [
                    { transform: 'scale(1)', filter: 'brightness(1)' },
                    { transform: 'scale(1.12)', filter: 'brightness(1.35)' },
                    { transform: 'scale(1)', filter: 'brightness(1)' }
                  ]
                : [
                    { transform: 'scale(1)' },
                    { transform: 'scale(1.08)' },
                    { transform: 'scale(1)' }
                  ],
              {
                duration: isRare ? 420 : 280,
                easing: 'ease-out'
              }
            );
          }

          setStatus(State.RESULT);
        }, isRare ? 700 : 500);
      };

      window.setTimeout(showNext, isRare ? 180 : 120);
    }

    function closeOverlay() {
      els.overlay.classList.remove('is-open');
      els.overlay.setAttribute('aria-hidden', 'true');
      appState.currentAction = null;
      appState.currentResult = null;
      appState.pendingTarget = null;
      appState.isRareHit = false;
      els.overlayMeta.textContent = '';
      setOverlayRareMode(false);
      setStatus(State.IDLE);
    }

    function initDefaultSlots() {
      const defaultTool = pickRandomImage('tool');
      const defaultStadium = pickRandomImage('stadium');

      if (defaultTool) {
        renderImageCard(els.toolSlot, defaultTool, 'どうぐ');
      } else {
        renderPlaceholder(els.toolSlot, '未設定 どうぐ');
      }

      if (defaultStadium) {
        renderImageCard(els.stadiumSlot, defaultStadium, 'スタジアム');
      } else {
        renderPlaceholder(els.stadiumSlot, '未設定 スタジアム');
      }
    }

    async function initializeApp() {
      try {
        await loadManifest();
        initDefaultSlots();
        setStatus(State.IDLE);
      } catch (error) {
        console.error(error);
        renderPlaceholder(els.toolSlot, 'manifest読込エラー');
        renderPlaceholder(els.stadiumSlot, 'manifest読込エラー');
        els.overlayMeta.textContent = 'manifest.json を確認してください';
        els.statusText.textContent = 'error';
        els.actionButtons.forEach(btn => {
          btn.disabled = true;
        });
      }
    }

    els.actionButtons.forEach(button => {
      button.addEventListener('click', () => {
        openOverlay(button.dataset.action);
      });
    });

    els.okButton.addEventListener('click', applyResult);

    initializeApp();
  </script>
</body>
</html>
